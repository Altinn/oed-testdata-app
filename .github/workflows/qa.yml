name: SonarQube Analysis

on:
  workflow_dispatch:
  schedule:
    - cron: '30 3 * * *' # Runs every day at 03:30 UTC (offset to avoid SWA concurrent-deploy race)

env:
  DOTNET_VERSION: "10.0.102"
  QATESTS: "1"

jobs:
  projecttests:
    name: Run QaTests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: dotnet restore

    - name: Build project
      run: dotnet build -c Release --no-restore

    # Altinn.Dd.Tests.SonarGate archives the snapshot to the oedqa blob container (auth via SAS
    # secret) and builds the SWA bundle locally under QaTests/TestResults/swa-bundle/.
    - name: Run QA tests
      env:
        AZURE_STORAGE_SAS_TOKEN: ${{ secrets.AZURE_STORAGE_SAS_TOKEN }}
      run: dotnet test QaTests --no-restore --verbosity normal

    # Ship the bundle to Azure Static Web Apps. Token is scoped to this step only.
    - name: Deploy dashboard to SWA
      if: success()
      uses: Azure/static-web-apps-deploy@v1
      with:
        azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
        action: upload
        app_location: QaTests/TestResults/swa-bundle
        skip_app_build: true
        output_location: ''
