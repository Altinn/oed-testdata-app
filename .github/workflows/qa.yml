name: SonarQube Analysis

on:
  workflow_dispatch:
  schedule:
    - cron: '30 3 * * *' # Runs every day at 03:30 UTC (offset to avoid SWA concurrent-deploy race)

env:
  DOTNET_VERSION: "10.0.102"
  QATESTS: "1"

jobs:
  projecttests:
    name: Run QaTests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3

    - name: Set up .NET
      uses: actions/setup-dotnet@55ec9447dda3d1cf6bd587150f3262f30ee10815 # v3
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: dotnet restore

    - name: Build project
      run: dotnet build -c Release --no-restore

    # Altinn.Dd.Tests.SonarGate scans the project, archives the snapshot to the oedqa blob
    # container, and publishes the dashboard to the account's $web static-website container
    # (auth via the SAS secret). No separate deploy step or hosting token is needed.
    - name: Run QA tests
      env:
        AZURE_STORAGE_SAS_TOKEN: ${{ secrets.AZURE_STORAGE_SAS_TOKEN }}
      run: dotnet test QaTests --no-restore --verbosity normal
